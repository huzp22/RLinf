# 与 ``restock_goods_beijing_chengdu_sm2sm_sft_openpi.yaml`` 对齐 OpenPI 训练超参；
# 便于使用：bash run_vla_sft.sh x2robot_sm2sm_sft_openpi
#
# OpenPI 对照：``openpi/src/openpi/training/config.py`` restock_goods_beijing_chengdu_sm2sm
# + ``openpi/src/openpi/training/optimizer.py`` CosineDecaySchedule / AdamW
# + ``TrainConfig.batch_size=128``、``seed=42``；DataLoader ``num_workers`` 本仓库设为 20
#
# 全局 batch=128：须 ``global_batch_size == micro_batch_size * GPU数 * gradient_accumulation``。
# 默认 4 卡：micro=32、accum=1；8 卡时可改为 micro=16。
defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 4-7

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "x2robot_sm2sm_sft_openpi"
    # W&B 需已 ``pip install wandb`` 且 ``wandb login`` 或设置 ``WANDB_API_KEY``；也可改为仅 tensorboard
    logger_backends: ["wandb", "tensorboard"]

  max_epochs: 128
  max_steps: 30000
  val_check_interval: -1
  save_interval: 2000

data:
  train_data_paths: "/mnt/public/gaojiahuan/huggingface/lerobot"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 128
  seed: 42
  openpi_num_workers: 20

  model:
    precision: null
    model_path: "/mnt/public/datasets/pretrained-checkpoints/openpi-assets/checkpoints/pi0_base"
    num_action_chunks: 20
    # 与 OpenPI Pi0Config 默认一致（模型 32 维；环境动作见 openpi.action_env_dim）
    action_dim: 32
    add_value_head: False
    openpi:
      config_name: "restock_goods_beijing_chengdu_sm2sm"
      action_dim: 32
      max_token_len: 100
      num_images_in_input: 3
      noise_level: 0.5
      action_chunk: ${actor.model.num_action_chunks}
      num_steps: 4
      train_expert_only: False
      action_env_dim: 28
      noise_method: "flow_sde"
      add_value_head: ${actor.model.add_value_head}
      detach_critic_input: True

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: cosine
    lr_warmup_steps: 1000
    total_training_steps: 30000
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
